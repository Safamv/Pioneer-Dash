<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pioneer Dashboard</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <div class="demo-banner">DEMO MODE -- all data is placeholder only</div>

  <header class="app-header">
    <div class="brand" id="brand">
      <svg class="brand-star" viewBox="0 0 100 100" aria-hidden="true">
        <polygon points="50,5 56.2,33.1 78.9,15.5 65.6,41 94.3,42.2 67.7,53.1 89,72.5 61.6,63.8 65.4,92.3 50,68 34.6,92.3 38.4,63.8 11,72.5 32.3,53.1 5.7,42.2 34.4,41 21.1,15.5 43.8,33.1"
                 fill="currentColor" />
      </svg>
      <span class="brand-title">Pioneer Dashboard</span>
    </div>
    <div class="nav-spacer"></div>
    <button class="nav-btn" id="nav-shortlist-filter" title="Show only shortlisted">
      <span>Shortlist</span><span class="count" id="shortlist-count">0</span>
    </button>
    <button class="nav-btn primary" id="nav-compare" style="display:none">Compare Selected</button>
    <button class="nav-btn danger" id="nav-logout">Sign out</button>
  </header>

  <main>
    <!-- HOME VIEW -->
    <section class="view active" id="view-home">
      <div class="home-layout">
        <div class="cards-panel">
          <div class="cards-header">
            <h2 id="cards-heading">All Countries</h2>
            <span class="cards-count" id="cards-count"></span>
          </div>
          <div class="cards-grid" id="cards-grid"></div>
        </div>
        <div class="map-panel">
          <div id="map"></div>
        </div>
      </div>
    </section>

    <!-- COUNTRY DETAIL VIEW -->
    <section class="view" id="view-detail">
      <div class="detail-header">
        <button class="back-btn" id="detail-back">&larr; Back</button>
        <div class="detail-title">
          <div class="detail-flag" id="detail-flag"></div>
          <div>
            <h1 class="detail-name" id="detail-name"></h1>
            <p class="detail-region" id="detail-region"></p>
          </div>
        </div>
        <div class="detail-actions">
          <button class="nav-btn" id="detail-shortlist">&#9734; Shortlist</button>
          <button class="nav-btn primary" id="detail-export">Export PDF</button>
        </div>
      </div>

      <div class="tabs" id="detail-tabs"></div>
      <div class="city-tabs" id="city-tabs"></div>

      <div class="toggle-panel" id="toggle-panel">
        <div class="toggle-panel-header" id="toggle-panel-header">
          <span>Show / hide fields</span>
          <span id="toggle-panel-caret">+</span>
        </div>
        <div class="toggle-panel-body" id="toggle-panel-body"></div>
      </div>

      <div id="detail-content"></div>
    </section>

    <!-- COMPARISON VIEW -->
    <section class="view" id="view-compare">
      <div class="detail-header">
        <button class="back-btn" id="compare-back">&larr; Back</button>
        <div class="detail-title">
          <h1 class="detail-name">Comparison</h1>
        </div>
        <div class="detail-actions">
          <button class="nav-btn primary" id="compare-export">Export PDF</button>
        </div>
      </div>

      <div class="toggle-panel open" id="compare-toggle-panel">
        <div class="toggle-panel-header" id="compare-toggle-header">
          <span>Show / hide fields</span>
          <span>&minus;</span>
        </div>
        <div class="toggle-panel-body" id="compare-toggle-body"></div>
      </div>

      <div class="compare-wrap">
        <div id="compare-content"></div>
      </div>
    </section>

    <p class="footer-note">
      Pioneer Dashboard &middot; demo build &middot; data is placeholder only.
      Verify all information independently before making decisions.
    </p>
  </main>

  <!-- Auth gate -->
  <script>
    if (sessionStorage.getItem('pioneer_auth') !== 'ok') {
      window.location.href = 'index.html';
    }
  </script>

  <!-- CDN libs -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Data + app -->
  <script src="data/countries.js"></script>
  <script src="js/map.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
